# ContentFlow — Nginx Media CDN config (V2-INFRA-003)
# Include this inside your server {} block or as a separate location block.
#
# Usage:
#   include /etc/nginx/conf.d/nginx-cdn.conf;
#
# This config serves uploaded media files with aggressive caching headers,
# gzip/brotli compression, and security headers appropriate for a CDN origin.

# ── Media files: aggressive caching ──────────────────────────────────────────
location /media/ {
    alias /app/media/;

    # Allow cross-origin access for embeds in external pages
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;

    # Aggressive cache: 1 year for immutable media (UUID filenames never change)
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # ETag + Last-Modified for conditional requests
    etag on;
    if_modified_since exact;

    # Serve precompressed files if they exist (.gz / .br)
    gzip_static on;

    # Limit to safe media types only — reject anything unexpected
    location ~* \.(jpg|jpeg|png|webp|gif|mp4|mov|pdf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Served-By "ContentFlow CDN" always;
    }

    # Block everything else under /media/
    location ~ {
        return 403;
    }
}

# ── Static frontend assets (Vite build output) ───────────────────────────────
location /assets/ {
    alias /app/frontend/dist/assets/;

    # Vite uses content-hashed filenames → safe to cache forever
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
    gzip_static on;
}

# ── Frontend SPA ──────────────────────────────────────────────────────────────
location / {
    root /app/frontend/dist;
    index index.html;

    # Never cache the HTML entry point (prevents stale app shell)
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;

    # React Router: fall back to index.html for client-side routes
    try_files $uri $uri/ /index.html;
}

# ── API proxy ─────────────────────────────────────────────────────────────────
location /api/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Do not cache API responses at Nginx level
    add_header Cache-Control "no-store" always;

    # Streaming / SSE support
    proxy_buffering off;
    proxy_read_timeout 300s;
}

# ── Global Gzip compression ───────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/x-javascript
    application/json
    application/xml
    application/xml+rss
    image/svg+xml
    font/ttf
    font/opentype
    font/woff
    font/woff2;
