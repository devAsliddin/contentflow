# ─────────────────────────────────────────────────────────────────────────────
# ContentFlow — Nginx HTTP-only bootstrap config
#
# PURPOSE: Used BEFORE obtaining the first SSL certificate.
#   1. Replace nginx-compose.conf with this file (or update volume mount).
#   2. Start services: docker compose up -d nginx
#   3. Obtain SSL cert: make ssl-init DOMAIN=yourdomain.com EMAIL=you@example.com
#   4. Switch back to nginx-compose.conf (which has TLS blocks).
#   5. Reload nginx: make restart-nginx
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Max upload (needed even in HTTP mode for health checks)
    client_max_body_size 512M;

    # ── Certbot ACME challenge (webroot method) ───────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # ── API health check (so docker healthcheck passes during init) ───────────
    location /api/health {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # ── API (pass through without redirect so you can test before SSL) ────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ── Frontend (React SPA) ──────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;
}
