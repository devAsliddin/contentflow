# ─────────────────────────────────────────────────────────────────────────────
# ContentFlow — Nginx HTTP config (production, pre-SSL)
# ─────────────────────────────────────────────────────────────────────────────

# Default server — block unknown hosts, allow internal health check only
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location /api/health {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 5s;
    }

    location / {
        return 444;
    }
}

# ContentFlow — main server block
server {
    listen 80;
    listen [::]:80;
    server_name contentflow.uz www.contentflow.uz;

    client_max_body_size 512M;

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options   "nosniff"                         always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection         "1; mode=block"                   always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml image/x-icon;

    # ── Certbot ACME challenge ─────────────────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # ── Auth endpoints — strict rate limit (5 req/min per IP) ─────────────────
    location ~ ^/api/v1/auth/(login|register|refresh) {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── API — general rate limit (60 req/min per IP) ───────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
    }

    # ── Media files ────────────────────────────────────────────────────────────
    location /media/ {
        alias /var/www/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Content-Disposition "attachment";
        types { }
        default_type application/octet-stream;
    }

    # ── React SPA ──────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/contentflow_access.log;
    error_log  /var/log/nginx/contentflow_error.log warn;
}
