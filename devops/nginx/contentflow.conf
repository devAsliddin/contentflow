# Rate limiting zones (defined in http block, placed here for reference)
# Add these to nginx.conf http block if not already present:
#   limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
#   limit_req_zone $binary_remote_addr zone=api_limit:20m  rate=60r/m;

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options              "SAMEORIGIN"                                always;
    add_header X-Content-Type-Options       "nosniff"                                   always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"           always;
    add_header X-XSS-Protection            "1; mode=block"                             always;
    add_header Permissions-Policy          "camera=(), microphone=(), geolocation=()"  always;

    # Max upload size (videos up to 500 MB)
    client_max_body_size 512M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript
               image/svg+xml image/x-icon;

    # ── Auth endpoints — strict rate limit (5 req/min per IP) ──────────────
    location ~ ^/api/v1/auth/(login|register|refresh) {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── API — general rate limit (60 req/min per IP) ───────────────────────
    location /api {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
    }

    # ── Media — served directly from disk (fast, no Python overhead) ───────
    location /media/ {
        alias /var/www/contentflow/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        # Prevent script execution from uploaded files
        add_header Content-Disposition "attachment";
        types { }
        default_type application/octet-stream;
    }

    # ── React SPA ──────────────────────────────────────────────────────────
    location / {
        root  /var/www/html/contentflow;
        index index.html;
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    access_log /var/log/nginx/contentflow_access.log;
    error_log  /var/log/nginx/contentflow_error.log;
}
