version: "3.9"

services:

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: contentflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-contentflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-contentflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-contentflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: contentflow_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # ─── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: contentflow_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-contentflow}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-contentflow}
      REDIS_URL: redis://redis:6379/0
      OLLAMA_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─── Celery Worker ─────────────────────────────────────────────────────────
  celery:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: contentflow_celery
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-contentflow}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-contentflow}
      REDIS_URL: redis://redis:6379/0
      OLLAMA_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - media_data:/app/media
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

  # ─── Celery Beat (Scheduler) ───────────────────────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: contentflow_celery_beat
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-contentflow}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-contentflow}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

  # ─── React Frontend (Nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: contentflow_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal
      - public

  # ─── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: contentflow_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./devops/nginx/contentflow.conf:/etc/nginx/conf.d/contentflow.conf:ro
      - ./devops/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - media_data:/var/www/media:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - internal
      - public

volumes:
  postgres_data:
  redis_data:
  media_data:
  certbot_certs:
  certbot_www:

networks:
  internal:
    driver: bridge
  public:
    driver: bridge
