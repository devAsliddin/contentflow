name: Deploy to Production

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false   # Never cancel an in-flight deploy

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     22
          timeout:  300s
          script: |
            set -euo pipefail
            cd /opt/contentflow
            bash devops/scripts/docker-deploy.sh

      - name: Notify on success
        if: success()
        run: |
          echo "Deployment to production succeeded."
          echo "Commit: ${{ github.sha }}"
          echo "Actor:  ${{ github.actor }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment FAILED for commit ${{ github.sha }}"
          echo "Check the VPS logs:"
          echo "  ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'cd /opt/contentflow && bash devops/scripts/docker-logs.sh all --tail=50'"
